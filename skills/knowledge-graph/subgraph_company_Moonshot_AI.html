<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Knowledge Graph - company_Moonshot_AI</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style type="text/css">
        #mynetwork {
            width: 100%;
            height: 800px;
            border: 1px solid lightgray;
        }
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #333;
        }
        .legend {
            margin-top: 10px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 5px;
        }
        .legend-item {
            display: inline-block;
            margin-right: 20px;
        }
        .color-box {
            display: inline-block;
            width: 20px;
            height: 20px;
            margin-right: 5px;
            vertical-align: middle;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <h1>Knowledge Graph - company_Moonshot_AI</h1>
    <div id="mynetwork"></div>
    <div class="legend">
        <strong>图例:</strong>
        <div class="legend-item"><span class="color-box" style="background: #FF6B6B;"></span>股票</div>
        <div class="legend-item"><span class="color-box" style="background: #4ECDC4;"></span>行业</div>
        <div class="legend-item"><span class="color-box" style="background: #45B7D1;"></span>概念</div>
        <div class="legend-item"><span class="color-box" style="background: #FFA07A;"></span>事件</div>
        <div class="legend-item"><span class="color-box" style="background: #98D8C8;"></span>人物</div>
        <div class="legend-item"><span class="color-box" style="background: #F7DC6F;"></span>研报</div>
    </div>
    <script type="text/javascript">
        // 数据
        var nodes = new vis.DataSet([{"id": "location_Beijing", "label": "北京", "title": "Type: Location<br>ID: location_Beijing", "color": "#CCCCCC", "shape": "dot", "size": 20}, {"id": "company_Moonshot_AI", "label": "Moonshot AI", "title": "Type: Company<br>ID: company_Moonshot_AI", "color": "#CCCCCC", "shape": "dot", "size": 20}]);
        var edges = new vis.DataSet([{"from": "company_Moonshot_AI", "to": "location_Beijing", "label": "considering_incorporation", "title": "Type: considering_incorporation<br>Confidence: 1.0", "arrows": "to", "color": {"color": "#848484", "highlight": "#FF6B6B"}}]);
        
        // 创建网络
        var container = document.getElementById('mynetwork');
        var data = {
            nodes: nodes,
            edges: edges
        };
        var options = {
            nodes: {
                font: {
                    size: 14,
                    color: '#333'
                },
                borderWidth: 2,
                shadow: true
            },
            edges: {
                width: 2,
                shadow: true,
                smooth: {
                    type: 'continuous'
                },
                font: {
                    size: 12,
                    align: 'middle'
                }
            },
            physics: {
                stabilization: false,
                barnesHut: {
                    gravitationalConstant: -8000,
                    springConstant: 0.04,
                    springLength: 200
                }
            },
            interaction: {
                hover: true,
                tooltipDelay: 200,
                hideEdgesOnDrag: true
            }
        };
        
        var network = new vis.Network(container, data, options);
        
        // 点击事件
        network.on("click", function (params) {
            if (params.nodes.length > 0) {
                var nodeId = params.nodes[0];
                console.log("Clicked node:", nodeId);
            }
        });
    </script>
</body>
</html>
